name: Deploy to GitHub Pages

# Builds the Angular app from `main` and publishes it to GitHub Pages via the
# Actions artifact flow — no `gh-pages` branch required. The live demo updates
# on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not ci) so the build is resilient to lockfile/platform drift
        # — the committed lock omits some Linux-only optional deps.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npx ng build --base-href=/User-Explorer/

      - name: Add SPA fallback (serve index.html for unknown routes)
        run: cp dist/Onflo-Project-Template/browser/index.html dist/Onflo-Project-Template/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/Onflo-Project-Template/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
